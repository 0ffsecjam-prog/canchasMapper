<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>canchasMapper · AMBA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">⚽</span>
        <strong>canchasMapper</strong>
        <span class="subtitle">canchas y lugares para hacer deporte en AMBA</span>
      </div>
      <div class="topbar-actions">
        <input id="search" type="search" placeholder="Buscar: nombre, dirección, deporte (zumba, padel, futbol 5, tiro federal…)">
        <span id="count-badge" class="badge">0 resultados</span>
        <button id="toggle-filters" class="btn-ghost">Filtros</button>
        <a href="/admin" class="btn-ghost">Admin</a>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <div class="filter-group">
        <h3>Mapa</h3>
        <select id="map-engine">
          <option value="osm">OpenStreetMap (default)</option>
          <option value="carto-light">Carto · Claro</option>
          <option value="carto-dark">Carto · Oscuro</option>
          <option value="esri-sat">Esri · Satélite</option>
          <option value="opentopo">OpenTopoMap</option>
          <option value="google" disabled>Google Maps (requiere API key)</option>
        </select>
        <label class="check-row">
          <input type="checkbox" id="show-boundaries"> Mostrar límites (partidos / barrios)
        </label>
      </div>

      <div class="filter-group">
        <h3>Zona <span id="zones-selected-count" class="muted"></span></h3>
        <input id="zone-search" type="search" placeholder="Buscar barrio o partido…">
        <div class="zone-tabs">
          <button class="zone-tab active" data-kind="all">Todas</button>
          <button class="zone-tab" data-kind="barrio">Barrios CABA</button>
          <button class="zone-tab" data-kind="partido">Partidos GBA</button>
        </div>
        <div id="filter-zones" class="chip-group chips-scroll">cargando…</div>
        <button id="clear-zones" class="btn-link">Limpiar zonas</button>
      </div>

      <div class="filter-group">
        <h3>Tipo de lugar</h3>
        <div id="filter-types" class="chip-group"></div>
      </div>

      <div class="filter-group">
        <h3>Tamaño</h3>
        <div id="filter-sizes" class="chip-group">
          <label class="chip"><input type="checkbox" value="chica"> Chica</label>
          <label class="chip"><input type="checkbox" value="mediana"> Mediana</label>
          <label class="chip"><input type="checkbox" value="grande"> Grande</label>
        </div>
      </div>

      <div class="filter-group">
        <h3>Deporte / Actividad <span id="sports-selected-count" class="muted"></span></h3>
        <input id="sport-search" type="search" placeholder="Filtrar deporte (futbol, zumba, yoga…)">
        <div id="filter-sports" class="chip-group chips-scroll"></div>
      </div>

      <div class="filter-group">
        <button id="reset-filters" class="btn-secondary">Limpiar todos los filtros</button>
      </div>

      <div class="filter-group">
        <h3>Exportar (con los filtros actuales)</h3>
        <div class="export-buttons">
          <button id="export-xlsx" class="btn-export">📊 Excel (.xlsx)</button>
          <button id="export-html" class="btn-export">🗺️ HTML con mapa</button>
          <button id="export-html-preview" class="btn-link">Previsualizar HTML →</button>
        </div>
      </div>

      <div class="filter-group sidebar-stats">
        <h3>Datos</h3>
        <div id="sidebar-stats">cargando…</div>
      </div>
    </aside>

    <main id="map"></main>

    <div id="detail-panel" class="detail-panel hidden">
      <button id="detail-close" class="btn-close" title="Cerrar">×</button>
      <div id="detail-content"></div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
